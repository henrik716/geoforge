<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub OAuth Callback</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #f6f8fa;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-width: 400px;
        }
        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid #e1e4e8;
            border-top: 2px solid #0969da;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            color: #cf222e;
            background: #ffebe9;
            padding: 1rem;
            border-radius: 6px;
            margin: 1rem 0;
        }
        .success {
            color: #1a7f37;
            background: #dcffe4;
            padding: 1rem;
            border-radius: 6px;
            margin: 1rem 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>Processing authentication...</h2>
        <p id="status">Completing GitHub authentication...</p>
        <div id="message"></div>
    </div>

    <script>
        // Get the authorization code from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const error = urlParams.get('error');
        const errorDescription = urlParams.get('error_description');

        console.log('OAuth callback received:', { code: code ? 'present' : 'missing', error, errorDescription });

        if (error) {
            // Send error to parent window
            window.opener.postMessage({
                type: 'oauth-error',
                error: errorDescription || error
            }, window.location.origin);
            
            // Show error and close
            document.getElementById('status').textContent = 'Authentication failed: ' + (errorDescription || error);
            setTimeout(() => window.close(), 3000);
        } else if (code) {
            // Send authorization code to parent window for token exchange
            window.opener.postMessage({
                type: 'oauth-code',
                code: code
            }, window.location.origin);
            
            // Show success and close
            document.getElementById('status').textContent = 'Authentication successful!';
            setTimeout(() => window.close(), 1500);
        } else {
            // No code and no error
            window.opener.postMessage({
                type: 'oauth-error',
                error: 'No authorization code received'
            }, window.location.origin);
            
            document.getElementById('status').textContent = 'Authentication failed: No code received';
            setTimeout(() => window.close(), 3000);
        }
    </script>
</body>
</html>
